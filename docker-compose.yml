services:
  # API Gateway
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_USER=${APP_DB_USER:-app_user}
      - DB_PASSWORD=${APP_DB_PASSWORD}
      - DB_HOST=postgres
      - DB_NAME=webhooks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      messaging-service:
        condition: service_started
      collaboration-service:
        condition: service_started
      media-service:
        condition: service_started
      shop-service:
        condition: service_started
      ai-service:
        condition: service_started
      streaming-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - milonexa-network

  # Security service for admin panel and authentication
  security-service:
    build:
      context: ./services
      dockerfile: security-service/Dockerfile
    restart: unless-stopped
    ports:
      - "${SECURITY_PORT:-9102}:${SECURITY_PORT:-9102}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - SECURITY_PORT=${SECURITY_PORT:-9102}
      - ADMIN_API_SECRET=${ADMIN_API_SECRET}
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - USER_SERVICE_URL=http://user-service:8002
      - ADMIN_DB_URL=${ADMIN_DB_URL}
      - ADMIN_MASTER_USERNAME=${ADMIN_MASTER_USERNAME}
      - ADMIN_MASTER_PASSWORD=${ADMIN_MASTER_PASSWORD}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
    depends_on:
      user-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:${SECURITY_PORT:-9102}/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - milonexa-network

  # User Service (Authentication, Profiles)
  user-service:
    build:
      context: ./services
      dockerfile: user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/users
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_PUBLIC_KEY=${MAILGUN_PUBLIC_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-sandbox.mailgun.org}
      - MAILGUN_BASE_URL=${MAILGUN_BASE_URL:-https://api.mailgun.net}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@sandbox.mailgun.org}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8001/oauth/google/callback}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:8001/oauth/github/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8001/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # Content Service (Posts, Feeds, Videos)
  content-service:
    build:
      context: ./services
      dockerfile: content-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/content
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8002/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # Messaging Service (Chat, Real-time)
  messaging-service:
    build:
      context: ./services
      dockerfile: messaging-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/messages
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-dummy}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-dummy}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8003/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # Collaboration Service (Docs, Wiki, Notion-like)
  collaboration-service:
    build:
      context: ./services
      dockerfile: collaboration-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/collaboration
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8004/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # Media Service (Files, Images, Storage)
  media-service:
    build:
      context: ./services
      dockerfile: media-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/media
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - S3_BUCKET=${S3_BUCKET:-milonexa-media}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8005/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # Shop Service (E-commerce)
  shop-service:
    build:
      context: ./services
      dockerfile: shop-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:8006"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/shop
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8006/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

  # ─────────────────────────────────────────────────────────────────────────
  # Local LLM Runtime (Ollama) — privacy-safe, no external API keys needed.
  # Models are stored in the ollama-data volume and pulled on first start.
  # To use the custom Let's Connect persona:
  #   docker compose exec ollama ollama create letsconnect-ai -f /modelfiles/Modelfile
  # ─────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./services/ai-service/Modelfile:/modelfiles/Modelfile:ro
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:11434/api/tags > /dev/null 2>&1 || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - milonexa-network

  # Model initialiser — pulls the default model on first run then exits.
  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
    entrypoint: >
      sh -c "
        ollama pull $${OLLAMA_MODEL:-llama3.2} &&
        echo 'Model ready.'
      "
    networks:
      - milonexa-network

  # AI Assistant Service
  ai-service:
    build:
      context: ./services/ai-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8007:8007"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - OLLAMA_TIMEOUT_MS=${OLLAMA_TIMEOUT_MS:-120000}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8007/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - milonexa-network

  # Streaming Service (Radio, IPTV)
  streaming-service:
    build:
      context: ./services
      dockerfile: streaming-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8009:8009"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${APP_DB_USER:-app_user}:${APP_DB_PASSWORD}@postgres:5432/streaming
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - RUN_SEED=${RUN_SEED:-true}
      - SEED_MODE=${SEED_MODE:-minimal}
      - USE_FULL_SEED=${USE_FULL_SEED:-false}
      - SEED_MINIMAL_RADIO_LIMIT=${SEED_MINIMAL_RADIO_LIMIT:-50}
      - SEED_MINIMAL_TV_LIMIT=${SEED_MINIMAL_TV_LIMIT:-50}
      - SEED_SKIP_ONLINE_FETCH=${SEED_SKIP_ONLINE_FETCH:-false}
      - SEED_SKIP_VALIDATION=${SEED_SKIP_VALIDATION:-true}
      - SEED_SKIP_ENRICHMENT=${SEED_SKIP_ENRICHMENT:-true}
      - SEED_BATCH_SIZE=${SEED_BATCH_SIZE:-100}
      - SEED_FAST_DISABLE_STREAM_VALIDATION=${SEED_FAST_DISABLE_STREAM_VALIDATION:-true}
      - SEED_FAST_DISABLE_LOGO_NETWORK=${SEED_FAST_DISABLE_LOGO_NETWORK:-true}
      - SEED_FAST_DISABLE_YOUTUBE_ENRICHMENT=${SEED_FAST_DISABLE_YOUTUBE_ENRICHMENT:-true}
      - SEED_FAST_DISABLE_DELAYS=${SEED_FAST_DISABLE_DELAYS:-true}
      - SEED_FAST_SKIP_PER_ITEM_PRECHECK=${SEED_FAST_SKIP_PER_ITEM_PRECHECK:-true}
      - SEED_CHUNK_DELAY_MS=${SEED_CHUNK_DELAY_MS:-0}
      - SEED_CHANNEL_ENRICH_MAX_CONCURRENT=${SEED_CHANNEL_ENRICH_MAX_CONCURRENT:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8009/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - milonexa-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - GENERATE_SOURCEMAP=${GENERATE_SOURCEMAP:-false}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
      - REACT_APP_HCAPTCHA_SITEKEY=${REACT_APP_HCAPTCHA_SITEKEY}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - milonexa-network

  # ─────────────────────────────────────────────────────────────────
  # ADMIN PANEL INTERFACES  (admin/ directory — unified structure)
  # Default enabled: web dashboard only.  All others opt-in via env.
  # ─────────────────────────────────────────────────────────────────

  # 1) Admin Web Dashboard — React UI (ENABLED BY DEFAULT)
  # Enable: ENABLE_ADMIN_WEB=true (default) + profile 'admin'
  # docker compose --profile admin up admin-web
  admin-web:
    profiles:
      - admin
    build:
      context: ./admin/web
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_WEB=${ENABLE_ADMIN_WEB:-true}
      - NODE_ENV=${NODE_ENV:-production}
      - GENERATE_SOURCEMAP=${GENERATE_SOURCEMAP:-false}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
      - REACT_APP_ADMIN_SECRET=${REACT_APP_ADMIN_SECRET}
    ports:
      - "${ADMIN_WEB_PORT:-3001}:3001"
    depends_on:
      security-service:
        condition: service_healthy
    networks:
      - milonexa-network

  # 2) Admin REST API Server — HTTP REST interface
  # Enable: ENABLE_ADMIN_REST_API=true + profile 'admin-api'
  # docker compose --profile admin-api up admin-rest-api
  admin-rest-api:
    profiles:
      - admin-api
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=rest-api
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_REST_API=${ENABLE_ADMIN_REST_API:-false}
      - ADMIN_API_PORT=${ADMIN_API_PORT:-8888}
      - ADMIN_API_HOST=0.0.0.0
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ADMIN_CORS_ORIGIN=${ADMIN_CORS_ORIGIN:-*}
      - ADMIN_ALLOWED_IPS=${ADMIN_ALLOWED_IPS:-127.0.0.1,::1}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "127.0.0.1:${ADMIN_API_PORT:-8888}:8888"
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # 3) Admin SSH Dashboard — encrypted SSH-based interactive dashboard
  # Enable: ENABLE_ADMIN_SSH=true + profile 'admin-ssh'
  # docker compose --profile admin-ssh up admin-ssh
  admin-ssh:
    profiles:
      - admin-ssh
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=ssh
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_SSH=${ENABLE_ADMIN_SSH:-false}
      - ADMIN_SSH_PORT=${ADMIN_SSH_PORT:-2222}
      - ADMIN_SSH_HOST=0.0.0.0
      - ADMIN_SSH_PASSWORD=${ADMIN_SSH_PASSWORD}
      - ADMIN_SSH_AUTHORIZED_KEYS=${ADMIN_SSH_AUTHORIZED_KEYS:-/ssh-keys/authorized_keys}
      - ADMIN_SSH_HOST_KEY_PATH=/app/.admin-cli/ssh/host_rsa
      - ADMIN_SSH_MAX_SESSIONS=${ADMIN_SSH_MAX_SESSIONS:-5}
      - ADMIN_SSH_IDLE_TIMEOUT=${ADMIN_SSH_IDLE_TIMEOUT:-300}
      - ADMIN_ALLOWED_IPS=${ADMIN_ALLOWED_IPS:-127.0.0.1,::1}
      - ADMIN_SSH_BANNER=${ADMIN_SSH_BANNER:-Milonexa Admin SSH — Authorized Access Only}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "127.0.0.1:${ADMIN_SSH_PORT:-2222}:2222"
    volumes:
      - admin-state:/app/.admin-cli
      - ${ADMIN_SSH_KEYS_DIR:-./admin/ssh/ssh-keys}:/ssh-keys:ro
    networks:
      - milonexa-network

  # 4) Admin Webhook Server — notification delivery hub
  # Enable: ENABLE_ADMIN_WEBHOOK=true + profile 'admin-webhook'
  # docker compose --profile admin-webhook up admin-webhook
  admin-webhook:
    profiles:
      - admin-webhook
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=webhook
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_WEBHOOK=${ENABLE_ADMIN_WEBHOOK:-false}
      - ADMIN_WEBHOOK_PORT=${ADMIN_WEBHOOK_PORT:-8889}
      - ADMIN_WEBHOOK_HOST=0.0.0.0
      - ADMIN_WEBHOOK_SECRET=${ADMIN_WEBHOOK_SECRET}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "127.0.0.1:${ADMIN_WEBHOOK_PORT:-8889}:8889"
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # 5) Admin Telegram Bot
  # Enable: ENABLE_ADMIN_BOT_TELEGRAM=true + profile 'admin-bot-telegram'
  # docker compose --profile admin-bot-telegram up admin-bot-telegram
  admin-bot-telegram:
    profiles:
      - admin-bot-telegram
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=bot
    command: ["node", "telegram/bot.js"]
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_BOT_TELEGRAM=${ENABLE_ADMIN_BOT_TELEGRAM:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_USER_IDS=${TELEGRAM_ADMIN_USER_IDS}
      - TELEGRAM_ADMIN_CHAT_IDS=${TELEGRAM_ADMIN_CHAT_IDS}
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # 6) Admin Slack Bot
  # Enable: ENABLE_ADMIN_BOT_SLACK=true + profile 'admin-bot-slack'
  # docker compose --profile admin-bot-slack up admin-bot-slack
  admin-bot-slack:
    profiles:
      - admin-bot-slack
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=bot
    command: ["node", "slack/bot.js"]
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_BOT_SLACK=${ENABLE_ADMIN_BOT_SLACK:-false}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_ADMIN_CHANNELS=${SLACK_ADMIN_CHANNELS}
      - SLACK_ADMIN_USER_IDS=${SLACK_ADMIN_USER_IDS}
      - SLACK_BOT_PORT=${SLACK_BOT_PORT:-3003}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "127.0.0.1:${SLACK_BOT_PORT:-3003}:3003"
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # 7) Admin Email Command Interface
  # Enable: ENABLE_ADMIN_EMAIL=true + profile 'admin-email'
  # docker compose --profile admin-email up admin-email
  admin-email:
    profiles:
      - admin-email
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=email
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_EMAIL=${ENABLE_ADMIN_EMAIL:-false}
      - ADMIN_EMAIL_USER=${ADMIN_EMAIL_USER}
      - ADMIN_EMAIL_PASSWORD=${ADMIN_EMAIL_PASSWORD}
      - ADMIN_EMAIL_IMAP_HOST=${ADMIN_EMAIL_IMAP_HOST}
      - ADMIN_EMAIL_IMAP_PORT=${ADMIN_EMAIL_IMAP_PORT:-993}
      - ADMIN_EMAIL_IMAP_TLS=${ADMIN_EMAIL_IMAP_TLS:-true}
      - ADMIN_EMAIL_SMTP_HOST=${ADMIN_EMAIL_SMTP_HOST}
      - ADMIN_EMAIL_SMTP_PORT=${ADMIN_EMAIL_SMTP_PORT:-587}
      - ADMIN_EMAIL_SMTP_SECURE=${ADMIN_EMAIL_SMTP_SECURE:-false}
      - ADMIN_EMAIL_FROM=${ADMIN_EMAIL_FROM}
      - ADMIN_EMAIL_ALLOWED_SENDERS=${ADMIN_EMAIL_ALLOWED_SENDERS}
      - ADMIN_EMAIL_SUBJECT_PREFIX=${ADMIN_EMAIL_SUBJECT_PREFIX:-[ADMIN-CMD]}
      - ADMIN_EMAIL_SIGNATURE=${ADMIN_EMAIL_SIGNATURE}
      - ADMIN_EMAIL_POLL_INTERVAL=${ADMIN_EMAIL_POLL_INTERVAL:-30}
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # 8) AI Autonomous Admin Agent — next-gen AI-managed admin
  # Enable: ENABLE_ADMIN_AI=true + profile 'admin-ai'
  # docker compose --profile admin-ai up admin-ai
  # The AI agent continuously monitors, heals, secures, and optimizes the platform.
  admin-ai:
    profiles:
      - admin-ai
    build:
      context: ./admin
      dockerfile: Dockerfile.backend
      args:
        - SERVICE=ai
    restart: unless-stopped
    environment:
      - ENABLE_ADMIN_AI=${ENABLE_ADMIN_AI:-false}
      - AI_PROVIDER=${AI_PROVIDER:-demo}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AI_CYCLE_INTERVAL_SECONDS=${AI_CYCLE_INTERVAL_SECONDS:-60}
      - AI_STATUS_PORT=${AI_STATUS_PORT:-8890}
      - AI_NOTIFY_EVERY_CYCLE=${AI_NOTIFY_EVERY_CYCLE:-false}
      - AI_EMERGENCY_NOTIFY=${AI_EMERGENCY_NOTIFY:-true}
      - AI_AUTO_HEAL=${AI_AUTO_HEAL:-true}
      - AI_AUTO_SECURITY=${AI_AUTO_SECURITY:-true}
      - AI_GATEWAY_URL=${AI_GATEWAY_URL:-http://api-gateway:8000}
      - AI_PERMISSION_TIMEOUT_MINUTES=${AI_PERMISSION_TIMEOUT_MINUTES:-30}
      # Notification integrations (reuse bot credentials if set)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ADMIN_CHAT_IDS=${TELEGRAM_ADMIN_CHAT_IDS}
      - ADMIN_WEBHOOK_SLACK_URLS=${ADMIN_WEBHOOK_SLACK_URLS}
      - ADMIN_WEBHOOK_DISCORD_URLS=${ADMIN_WEBHOOK_DISCORD_URLS}
      - NODE_ENV=${NODE_ENV:-production}
    ports:
      - "127.0.0.1:${AI_STATUS_PORT:-8890}:8890"
    volumes:
      - admin-state:/app/.admin-cli
    networks:
      - milonexa-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - APP_DB_USER=${APP_DB_USER:-app_user}
      - APP_DB_PASSWORD=${APP_DB_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=users,content,messages,collaboration,media,shop,webhooks,streaming,admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - milonexa-network

  # Redis (Caching, Real-time)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - milonexa-network

  # Elasticsearch (Full-text search and analytics)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health > /dev/null 2>&1 || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - milonexa-network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && exec 3<&- && exec 3>&-" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - milonexa-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  elasticsearch-data:
  admin-state:
  ollama-data:


networks:
  milonexa-network:
    driver: bridge
