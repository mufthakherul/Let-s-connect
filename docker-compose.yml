services:
  # API Gateway
  api-gateway:
    build:
      context: ./services
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_USER=postgres
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DB_HOST=postgres
      - DB_NAME=webhooks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
      messaging-service:
        condition: service_started
      collaboration-service:
        condition: service_started
      media-service:
        condition: service_started
      shop-service:
        condition: service_started
      ai-service:
        condition: service_started
      streaming-service:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8000/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - lets-connect-network

  # User Service (Authentication, Profiles)
  user-service:
    build:
      context: ./services
      dockerfile: user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/users
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_PUBLIC_KEY=${MAILGUN_PUBLIC_KEY}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-sandbox.mailgun.org}
      - MAILGUN_BASE_URL=${MAILGUN_BASE_URL:-https://api.mailgun.net}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@sandbox.mailgun.org}
      - HCAPTCHA_SECRET=${HCAPTCHA_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8001/oauth/google/callback}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - GITHUB_REDIRECT_URI=${GITHUB_REDIRECT_URI:-http://localhost:8001/oauth/github/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8001/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Content Service (Posts, Feeds, Videos)
  content-service:
    build:
      context: ./services
      dockerfile: content-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/content
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8002/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Messaging Service (Chat, Real-time)
  messaging-service:
    build:
      context: ./services
      dockerfile: messaging-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/messages
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-dummy}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-dummy}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8003/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Collaboration Service (Docs, Wiki, Notion-like)
  collaboration-service:
    build:
      context: ./services
      dockerfile: collaboration-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/collaboration
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8004/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Media Service (Files, Images, Storage)
  media-service:
    build:
      context: ./services
      dockerfile: media-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/media
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - S3_BUCKET=${S3_BUCKET:-lets-connect-media}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8005/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Shop Service (E-commerce)
  shop-service:
    build:
      context: ./services
      dockerfile: shop-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8006:8006"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/shop
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8006/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # AI Assistant Service
  ai-service:
    build:
      context: ./services/ai-service
    restart: unless-stopped
    ports:
      - "127.0.0.1:8007:8007"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8007/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

  # Streaming Service (Radio, IPTV)
  streaming-service:
    build:
      context: ./services
      dockerfile: streaming-service/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8009:8009"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/streaming
      - INTERNAL_GATEWAY_TOKEN=${INTERNAL_GATEWAY_TOKEN}
      - REDIS_URL=redis://redis:6379
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - RUN_SEED=${RUN_SEED:-true}
      - SEED_MODE=${SEED_MODE:-minimal}
      - USE_FULL_SEED=${USE_FULL_SEED:-false}
      - SEED_MINIMAL_RADIO_LIMIT=${SEED_MINIMAL_RADIO_LIMIT:-50}
      - SEED_MINIMAL_TV_LIMIT=${SEED_MINIMAL_TV_LIMIT:-50}
      - SEED_SKIP_ONLINE_FETCH=${SEED_SKIP_ONLINE_FETCH:-false}
      - SEED_SKIP_VALIDATION=${SEED_SKIP_VALIDATION:-true}
      - SEED_SKIP_ENRICHMENT=${SEED_SKIP_ENRICHMENT:-true}
      - SEED_BATCH_SIZE=${SEED_BATCH_SIZE:-100}
      - SEED_FAST_DISABLE_STREAM_VALIDATION=${SEED_FAST_DISABLE_STREAM_VALIDATION:-true}
      - SEED_FAST_DISABLE_LOGO_NETWORK=${SEED_FAST_DISABLE_LOGO_NETWORK:-true}
      - SEED_FAST_DISABLE_YOUTUBE_ENRICHMENT=${SEED_FAST_DISABLE_YOUTUBE_ENRICHMENT:-true}
      - SEED_FAST_DISABLE_DELAYS=${SEED_FAST_DISABLE_DELAYS:-true}
      - SEED_FAST_SKIP_PER_ITEM_PRECHECK=${SEED_FAST_SKIP_PER_ITEM_PRECHECK:-true}
      - SEED_CHUNK_DELAY_MS=${SEED_CHUNK_DELAY_MS:-0}
      - SEED_CHANNEL_ENRICH_MAX_CONCURRENT=${SEED_CHANNEL_ENRICH_MAX_CONCURRENT:-20}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8009/health > /dev/null 2>&1 || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - lets-connect-network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - GENERATE_SOURCEMAP=${GENERATE_SOURCEMAP:-false}
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000}
      - REACT_APP_HCAPTCHA_SITEKEY=${REACT_APP_HCAPTCHA_SITEKEY}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - lets-connect-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_MULTIPLE_DATABASES=users,content,messages,collaboration,media,shop,webhooks,streaming
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lets-connect-network

  # Redis (Caching, Real-time)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lets-connect-network

  # Elasticsearch (Full-text search and analytics)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health > /dev/null 2>&1 || exit 1" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lets-connect-network

  # MinIO (S3-compatible object storage)
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9010:9000"
      - "127.0.0.1:9011:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && exec 3<&- && exec 3>&-" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - lets-connect-network

volumes:
  postgres-data:
  redis-data:
  minio-data:
  elasticsearch-data:


networks:
  lets-connect-network:
    driver: bridge
