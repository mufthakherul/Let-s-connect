---
# Alertmanager for Milonexa
# Routes Prometheus alerts to severity-specific email receivers.

apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: milonexa
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
      smtp_from: '${SMTP_FROM_EMAIL}'
      smtp_auth_username: '${SMTP_USER}'
      smtp_auth_password: '${SMTP_PASSWORD}'
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'job', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: warning-email
      routes:
        - matchers:
            - severity="critical"
          receiver: critical-email
          continue: true
        - matchers:
            - severity="warning"
          receiver: warning-email

    receivers:
      - name: critical-email
        email_configs:
          - to: 'critical-ops@milonexa.com'
            send_resolved: true
            headers:
              Subject: '[CRITICAL] Milonexa Alert: {{ .CommonLabels.alertname }}'
      - name: warning-email
        email_configs:
          - to: 'ops@milonexa.com'
            send_resolved: true
            headers:
              Subject: '[WARNING] Milonexa Alert: {{ .CommonLabels.alertname }}'

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ['alertname', 'job']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: milonexa
  labels:
    app: alertmanager
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        component: monitoring
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--config.expand-env'
            - '--storage.path=/alertmanager'
          ports:
            - name: web
              containerPort: 9093
              protocol: TCP
          env:
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: SMTP_USER
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: SMTP_FROM_EMAIL
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: milonexa
  labels:
    app: alertmanager
    component: monitoring
spec:
  type: ClusterIP
  selector:
    app: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      protocol: TCP
