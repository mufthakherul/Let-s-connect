apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage
  namespace: milonexa
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: slow-hdd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: database-backup
  namespace: milonexa
  labels:
    app: database-backup
    component: backup
spec:
  # Run daily at 2:00 AM UTC
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: database-backup
        component: backup
    spec:
      template:
        metadata:
          labels:
            app: database-backup
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: backup
            image: postgres:15-alpine
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache bash redis
                chmod +x /scripts/backup-db.sh
                /scripts/backup-db.sh
            env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: milonexa-secrets
                  key: DATABASE_PASSWORD
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: BACKUP_DIR
              value: "/backups"
            - name: RETENTION_DAYS
              value: "30"
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            - name: backup-scripts
              mountPath: /scripts
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-storage
          - name: backup-scripts
            configMap:
              name: backup-scripts
              defaultMode: 0755
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-scripts
  namespace: milonexa
data:
  backup-db.sh: |
    #!/bin/bash
    set -euo pipefail

    BACKUP_DIR="${BACKUP_DIR:-/backups}"
    RETENTION_DAYS="${RETENTION_DAYS:-30}"
    TIMESTAMP="$(date -u +%Y%m%d_%H%M%S)"
    DATABASES=(users content messages collaboration media shop ai)

    PG_HOST="${POSTGRES_HOST:-postgres}"
    PG_PORT="${POSTGRES_PORT:-5432}"
    PG_USER="${POSTGRES_USER:-postgres}"

    if [[ -z "${POSTGRES_PASSWORD:-}" ]]; then
      echo "POSTGRES_PASSWORD must be set"
      exit 1
    fi

    export PGPASSWORD="${POSTGRES_PASSWORD}"
    mkdir -p "${BACKUP_DIR}"

    echo "[backup] starting backup at ${TIMESTAMP}"

    for db in "${DATABASES[@]}"; do
      file="${BACKUP_DIR}/${db}_${TIMESTAMP}.sql.gz"
      if pg_dump -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USER}" -d "${db}" | gzip > "${file}"; then
        echo "[backup] ${db} -> ${file}"
      else
        echo "[backup] WARNING: failed to backup ${db}"
      fi
    done

    if command -v redis-cli >/dev/null 2>&1; then
      REDIS_HOST="${REDIS_HOST:-redis}"
      REDIS_PORT="${REDIS_PORT:-6379}"
      redis-cli -h "${REDIS_HOST}" -p "${REDIS_PORT}" --rdb "${BACKUP_DIR}/redis_${TIMESTAMP}.rdb" || \
        echo "[backup] WARNING: redis backup failed"
    fi

    find "${BACKUP_DIR}" -name "*.sql.gz" -mtime +"${RETENTION_DAYS}" -delete || true
    find "${BACKUP_DIR}" -name "*.rdb" -mtime +"${RETENTION_DAYS}" -delete || true

    echo "[backup] completed"
  restore-db.sh: |
    #!/bin/bash
    set -euo pipefail

    BACKUP_DIR="${BACKUP_DIR:-/backups}"
    PG_HOST="${POSTGRES_HOST:-postgres}"
    PG_PORT="${POSTGRES_PORT:-5432}"
    PG_USER="${POSTGRES_USER:-postgres}"

    if [[ -z "${POSTGRES_PASSWORD:-}" ]]; then
      echo "POSTGRES_PASSWORD must be set"
      exit 1
    fi

    export PGPASSWORD="${POSTGRES_PASSWORD}"

    DB_NAME="${DB_NAME:-}"
    BACKUP_FILE="${BACKUP_FILE:-}"

    if [[ -z "${DB_NAME}" || -z "${BACKUP_FILE}" ]]; then
      echo "Usage: DB_NAME=<database> BACKUP_FILE=<file.sql.gz> /scripts/restore-db.sh"
      exit 1
    fi

    if [[ "${BACKUP_FILE}" != /* ]]; then
      BACKUP_FILE="${BACKUP_DIR}/${BACKUP_FILE}"
    fi

    if [[ ! -f "${BACKUP_FILE}" ]]; then
      echo "Backup file not found: ${BACKUP_FILE}"
      exit 1
    fi

    echo "[restore] restoring ${DB_NAME} from ${BACKUP_FILE}"
    psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USER}" -d postgres -v dbname="${DB_NAME}" -c \
      "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = :'dbname' AND pid <> pg_backend_pid();" || true
    psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USER}" -d postgres -c "DROP DATABASE IF EXISTS \"${DB_NAME}\";"
    psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USER}" -d postgres -c "CREATE DATABASE \"${DB_NAME}\";"
    gunzip -c "${BACKUP_FILE}" | psql -h "${PG_HOST}" -p "${PG_PORT}" -U "${PG_USER}" -d "${DB_NAME}"
    echo "[restore] completed"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-cleanup
  namespace: milonexa
  labels:
    app: backup-cleanup
    component: backup
spec:
  # Run monthly on the 1st at 4:00 AM UTC
  schedule: "0 4 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    metadata:
      labels:
        app: backup-cleanup
        component: backup
    spec:
      template:
        metadata:
          labels:
            app: backup-cleanup
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
          - name: cleanup
            image: alpine:latest
            command:
              - /bin/sh
              - -c
              - |
                echo "Cleaning up backups older than 30 days..."
                find /backups -name "*.sql.gz" -mtime +30 -delete
                find /backups -name "*.meta" -mtime +30 -delete
                find /backups -name "*.rdb" -mtime +30 -delete
                echo "Cleanup completed"
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-storage
---
apiVersion: v1
kind: Service
metadata:
  name: backup-restore
  namespace: milonexa
  labels:
    app: backup-restore
    component: backup
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: backup-restore
    component: backup
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-restore
  namespace: milonexa
  labels:
    app: backup-restore
    component: backup
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-restore
      component: backup
  template:
    metadata:
      labels:
        app: backup-restore
        component: backup
    spec:
      containers:
      - name: restore-api
        image: postgres:15-alpine
        command:
          - /bin/sh
          - -c
          - |
            echo "Restore API deployment placeholder"
            echo "In production, implement a proper restore API or use manual restore via restore-db.sh"
            echo "For now, this container provides access to backup storage for manual operations"
            # Keep container running for manual restore operations
            tail -f /dev/null
        env:
        - name: POSTGRES_HOST
          value: "postgres"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: milonexa-secrets
              key: DATABASE_PASSWORD
        - name: BACKUP_DIR
          value: "/backups"
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: backup-storage
          mountPath: /backups
        - name: backup-scripts
          mountPath: /scripts
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: backup-storage
        persistentVolumeClaim:
          claimName: backup-storage
      - name: backup-scripts
        configMap:
          name: backup-scripts
          defaultMode: 0755
