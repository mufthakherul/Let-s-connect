# Phase 19.3: Multi-region deployment configuration
# Strategy: Active-active across two regions with global load balancing.
# Primary region: us-east-1 | Secondary region: eu-west-1
# Requires: kubectl federation or ArgoCD ApplicationSets for multi-cluster delivery.
---
# Namespace for primary region marker (label-based)
apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-region-config
  namespace: milonexa
  labels:
    app: milonexa
    tier: config
data:
  # Region identity — overridden per cluster via Helm/Kustomize overlay
  REGION: "us-east-1"
  REGION_ROLE: "primary"       # primary | secondary | dr
  PEER_REGION: "eu-west-1"
  # Cross-region database replication endpoint (set via Kustomize overlay per cluster)
  DB_READ_REPLICA_REGION: ""   # e.g. eu-west-1.postgres.milonexa.internal
  # CDN edge (shared, global)
  CDN_DOMAIN: "cdn.milonexa.com"
  # Failover grace period (seconds) before routing shifts to secondary
  FAILOVER_GRACE_PERIOD: "30"
---
# Global ingress routing policy (annotation-based for Cloudflare/AWS Global Accelerator)
# This ConfigMap documents the routing policy; actual enforcement is at the DNS/LB layer.
apiVersion: v1
kind: ConfigMap
metadata:
  name: global-routing-policy
  namespace: milonexa
data:
  policy: |
    # Global Load Balancing Policy
    # - Health check: GET /health every 10s
    # - Failover threshold: 3 consecutive failures → redirect to secondary
    # - Geo-routing: EU traffic → eu-west-1, Americas + APAC → us-east-1
    # - Session affinity: by IP (client sticky for 60s during failover)
    # - Rate limit: Enforced per-region; not shared across regions
    primary_region: us-east-1
    primary_weight: 100      # 100% in steady state; reduce to 0 for failover
    secondary_region: eu-west-1
    secondary_weight: 0      # 0 in steady state; set to 100 for failover
    health_check_path: /health
    health_check_interval: 10
    unhealthy_threshold: 3
    healthy_threshold: 2
---
# HPA for cross-region services — each region's cluster applies independently
# This manifest is the base; region-specific limits set via Kustomize overlay.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-multiregion
  namespace: milonexa
  labels:
    app: api-gateway
    scope: multiregion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2     # Minimum 2 per region for availability
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 25
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 4
        periodSeconds: 30
---
# Cross-region service discovery ConfigMap
# Services use these endpoints to find peers in other regions.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cross-region-endpoints
  namespace: milonexa
data:
  # Set these via Kustomize overlay per cluster
  US_EAST_API_GATEWAY: "https://us.milonexa.com"
  EU_WEST_API_GATEWAY: "https://eu.milonexa.com"
  GLOBAL_CDN: "https://cdn.milonexa.com"
  # Database — primary always in us-east-1; replicas in each region
  DB_PRIMARY: "postgres.milonexa.internal:5432"
  DB_REPLICA_EU: ""    # Set by eu-west-1 overlay
  DB_REPLICA_US: ""    # Set by us-east-1 overlay
