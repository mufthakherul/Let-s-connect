# Phase 19: PgBouncer — connection pooling for PostgreSQL
# Pool mode: transaction (best for microservices)
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: milonexa
data:
  pgbouncer.ini: |
    [databases]
    users = host=postgres port=5432 dbname=users
    content = host=postgres port=5432 dbname=content
    messages = host=postgres port=5432 dbname=messages
    collaboration = host=postgres port=5432 dbname=collaboration
    media = host=postgres port=5432 dbname=media
    shop = host=postgres port=5432 dbname=shop

    [pgbouncer]
    pool_mode = transaction
    listen_port = 5432
    listen_addr = *
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    max_client_conn = 200
    default_pool_size = 25
    reserve_pool_size = 5
    server_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    admin_users = postgres
  userlist.txt: |
    "postgres" "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: milonexa
  labels:
    app: pgbouncer
    tier: database
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
        tier: database
    spec:
      containers:
      - name: pgbouncer
        image: bitnami/pgbouncer:1.22.1
        ports:
        - containerPort: 5432
          name: pgbouncer
        env:
        - name: POSTGRESQL_HOST
          value: "postgres"
        - name: POSTGRESQL_PORT
          value: "5432"
        - name: POSTGRESQL_USERNAME
          value: "postgres"
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: milonexa-secrets
              key: DATABASE_PASSWORD
        - name: PGBOUNCER_POOL_MODE
          value: "transaction"
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: "200"
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: "25"
        - name: PGBOUNCER_DATABASE
          value: "*"
        volumeMounts:
        - name: config
          mountPath: /bitnami/pgbouncer/conf
          readOnly: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: pgbouncer-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: milonexa
  labels:
    app: pgbouncer
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: pgbouncer
  type: ClusterIP
