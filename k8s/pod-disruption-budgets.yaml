# ── PostgreSQL StatefulSet ────────────────────────────────────────────────────
# Single-replica PostgreSQL — PDB protects against accidental eviction.
# If you run a HA postgres cluster (e.g. Patroni), increase minAvailable.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-postgres
  namespace: milonexa
  labels:
    app: postgres
    tier: database
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres

---
# ── Redis ─────────────────────────────────────────────────────────────────────
# Redis is single-node. PDB prevents eviction while node is draining.
# Extend to minAvailable: 1 with maxUnavailable: 0 for sentinel setups.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-redis
  namespace: milonexa
  labels:
    app: redis
    tier: cache
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: redis

