##############################################################################
# pod-disruption-budgets.yaml
#
# PodDisruptionBudgets (PDBs) ensure that voluntary disruptions (node drain,
# cluster upgrades, scaling events) never take down all replicas of a critical
# service simultaneously.
#
# Policy:
#   Stateless services  → minAvailable: 1   (at least one pod stays up)
#   Stateful singletons → minAvailable: 1   (prevents eviction)
#   High-traffic APIs   → minAvailable: 2   (extra cushion for API gateway)
#
# IMPORTANT: These PDBs assume each Deployment has been scaled to ≥2 replicas
# in staging/production. A PDB with minAvailable=1 on a 1-replica Deployment
# will BLOCK node drains. Verify replica counts match before applying.
##############################################################################

# ── API Gateway (external traffic entry point — keep ≥2 active) ──────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-api-gateway
  namespace: milonexa
  labels:
    app: api-gateway
    tier: ingress
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway

---
# ── User Service ──────────────────────────────────────────────────────────────
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-user-service
  namespace: milonexa
  labels:
    app: user-service
    tier: backend
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: user-service

