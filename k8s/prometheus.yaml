---
# Prometheus Monitoring for Milonexa Platform
# Phase 4: Scale & Performance (v2.5)
#
# This manifest deploys Prometheus for metrics collection and monitoring

# Prometheus ConfigMap - Scrape configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: milonexa
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'milonexa'
        environment: 'production'

    # Alerting configuration
    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    # Alert rule files
    rule_files:
      - /etc/prometheus/alerts/*.yml

    # Scrape configurations
    scrape_configs:
      # Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # User Service
      - job_name: 'user-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['user-service:8001']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # Content Service
      - job_name: 'content-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['content-service:8002']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # Messaging Service
      - job_name: 'messaging-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['messaging-service:8003']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # Collaboration Service
      - job_name: 'collaboration-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['collaboration-service:8004']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # Media Service
      - job_name: 'media-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['media-service:8005']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # Shop Service
      - job_name: 'shop-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['shop-service:8006']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # AI Service
      - job_name: 'ai-service'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ai-service:8007']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

      # API Gateway
      - job_name: 'api-gateway'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['api-gateway:8000']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            regex: '([^:]+):.*'
            replacement: '${1}'

---
# Prometheus Alert Rules (Workstream I)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: milonexa
data:
  service-alerts.yml: |
    groups:
      - name: service_health
        interval: 30s
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
              category: availability
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.job }} at {{ $labels.instance }} has been down for more than 1 minute."

          - alert: HighErrorRate
            expr: |
              (
                sum by(job) (rate(http_requests_total{status=~"5.."}[5m]))
                /
                clamp_min(sum by(job) (rate(http_requests_total[5m])), 0.001)
              ) > 0.05
            for: 10m
            labels:
              severity: warning
              category: reliability
            annotations:
              summary: "High error rate on {{ $labels.job }}"
              description: "{{ $labels.job }} has >5% 5xx over 5m."

          - alert: CircuitBreakerOpen
            expr: circuit_breaker_state{state="OPEN"} == 1
            for: 2m
            labels:
              severity: critical
              category: resilience
            annotations:
              summary: "Circuit breaker open for {{ $labels.service }}"
              description: "Circuit breaker for {{ $labels.service }} has been OPEN for 2+ minutes."

      - name: capacity
        interval: 30s
        rules:
          - alert: HighMemoryUsage
            expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
            for: 5m
            labels:
              severity: warning
              category: infrastructure
            annotations:
              summary: "High memory usage on {{ $labels.instance }}"
              description: "Available memory below 10%."

          - alert: HighCPUUsage
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 10m
            labels:
              severity: warning
              category: infrastructure
            annotations:
              summary: "High CPU usage on {{ $labels.instance }}"
              description: "CPU usage is above 80%."

  slo-alerts.yml: |
    groups:
      - name: slo_error_budget
        interval: 30s
        rules:
          - alert: ErrorBudgetBurnFast
            expr: |
              (
                sum by(job) (rate(http_requests_total{status=~"5.."}[5m]))
                /
                clamp_min(sum by(job) (rate(http_requests_total[5m])), 0.001)
              ) / 0.001 > 14.4
            for: 5m
            labels:
              severity: critical
              category: reliability
            annotations:
              summary: "Fast error budget burn on {{ $labels.job }}"
              description: "{{ $labels.job }} is consuming error budget >14.4x over 5m (SLO=99.9%)."

          - alert: ErrorBudgetBurnSlow
            expr: |
              (
                sum by(job) (rate(http_requests_total{status=~"5.."}[1h]))
                /
                clamp_min(sum by(job) (rate(http_requests_total[1h])), 0.001)
              ) / 0.001 > 2
            for: 30m
            labels:
              severity: warning
              category: reliability
            annotations:
              summary: "Sustained error budget burn on {{ $labels.job }}"
              description: "{{ $labels.job }} is consuming error budget >2x over 1h."

      - name: slo_latency
        interval: 30s
        rules:
          - alert: LatencyP95SLOBreached
            expr: |
              histogram_quantile(
                0.95,
                sum by(le, job) (rate(http_request_duration_seconds_bucket[5m]))
              ) > 0.5
            for: 15m
            labels:
              severity: warning
              category: performance
            annotations:
              summary: "P95 latency SLO breached on {{ $labels.job }}"
              description: "P95 latency for {{ $labels.job }} exceeded 500ms for 15 minutes."

          - alert: LatencyP99SLOBreached
            expr: |
              histogram_quantile(
                0.99,
                sum by(le, job) (rate(http_request_duration_seconds_bucket[5m]))
              ) > 1
            for: 15m
            labels:
              severity: warning
              category: performance
            annotations:
              summary: "P99 latency SLO breached on {{ $labels.job }}"
              description: "P99 latency for {{ $labels.job }} exceeded 1s for 15 minutes."

      - name: release_canary
        interval: 30s
        rules:
          - alert: CanaryErrorRateHigh
            expr: |
              sum by(job) (rate(http_requests_total{deployment="canary",status=~"5.."}[5m]))
              /
              clamp_min(sum by(job) (rate(http_requests_total{deployment="canary"}[5m])), 0.001)
              > 0.02
            for: 5m
            labels:
              severity: critical
              category: release
            annotations:
              summary: "Canary error rate high for {{ $labels.job }}"
              description: "Canary deployment for {{ $labels.job }} has >2% 5xx rate over 5m."

---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: milonexa
  labels:
    app: prometheus
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: monitoring
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
            - '--storage.tsdb.retention.time=30d'
            - '--web.console.libraries=/usr/share/prometheus/console_libraries'
            - '--web.console.templates=/usr/share/prometheus/consoles'
            - '--web.enable-lifecycle'
          ports:
            - name: web
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: alerts
              mountPath: /etc/prometheus/alerts
            - name: storage
              mountPath: /prometheus
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: alerts
          configMap:
            name: prometheus-alert-rules
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: milonexa
  labels:
    app: prometheus
    component: monitoring
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: web
  selector:
    app: prometheus

---
# Prometheus ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: milonexa

---
# Prometheus ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]

---
# Prometheus ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: milonexa

