  namespace: milonexa

---

# Media Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: media-service-rolebinding
  namespace: milonexa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: media-service-role
subjects:
- kind: ServiceAccount
  name: media-service
  namespace: milonexa

---

# Shop Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shop-service-rolebinding
  namespace: milonexa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-service-role
subjects:
- kind: ServiceAccount
  name: shop-service
  namespace: milonexa

---

# AI Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-service-rolebinding
  namespace: milonexa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-service-role
subjects:
- kind: ServiceAccount
  name: ai-service
  namespace: milonexa

---

# Security Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: security-service-rolebinding
  namespace: milonexa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: security-service-role
subjects:
- kind: ServiceAccount
  name: security-service
  namespace: milonexa

---

# Collaboration Service RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
