# RBAC Configuration for Kubernetes Production
# Role-Based Access Control for Milonexa Microservices

---

# ==================== NAMESPACES ====================

apiVersion: v1
kind: Namespace
metadata:
  name: milonexa
  labels:
    name: milonexa
    environment: production

---

# ==================== SERVICE ACCOUNTS ====================
# One service account per microservice, following least-privilege principle

apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: milonexa
  labels:
    app: milonexa
    component: api-gateway

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  namespace: milonexa
  labels:
    app: milonexa
    component: user-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: content-service
  namespace: milonexa
  labels:
    app: milonexa
    component: content-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: messaging-service
  namespace: milonexa
  labels:
    app: milonexa
    component: messaging-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: media-service
  namespace: milonexa
  labels:
    app: milonexa
    component: media-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: shop-service
  namespace: milonexa
  labels:
    app: milonexa
    component: shop-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-service
  namespace: milonexa
  labels:
    app: milonexa
    component: ai-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: security-service
  namespace: milonexa
  labels:
    app: milonexa
    component: security-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: collaboration-service
  namespace: milonexa
  labels:
    app: milonexa
    component: collaboration-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: streaming-service
  namespace: milonexa
  labels:
    app: milonexa
    component: streaming-service

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader
  namespace: milonexa
  labels:
    app: milonexa
    role: monitoring

---

# ==================== ROLES ====================
# Define permissions for different roles

# Role: API Gateway - Can read configs, secrets, manage pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: api-gateway-role
  namespace: milonexa
rules:
# Read service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
# Read config and secrets
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["milonexa-core-secrets", "milonexa-database-secrets", "milonexa-cache-secrets"]
  verbs: ["get"]
# Health check and pod discovery
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]

---

# Role: Backend Services - Can read configs, limited secret access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-service-role
  namespace: milonexa
rules:
# Service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
# Config maps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Limited secret access (only service-specific secrets)
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["milonexa-core-secrets", "milonexa-database-secrets", "milonexa-cache-secrets"]
  verbs: ["get"]

---

# Role: Media Service - Can read configs, secrets, and list pods
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: media-service-role
  namespace: milonexa
rules:
# Service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
# Config maps
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Secrets for storage credentials
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["milonexa-core-secrets", "milonexa-storage-secrets"]
  verbs: ["get"]
# Pod discovery for health checks
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---

# Role: AI Service - Can access AI secrets and storage
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-service-role
  namespace: milonexa
rules:
# Service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
# Config access
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Secrets for AI/LLM APIs
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["milonexa-core-secrets", "milonexa-ai-secrets", "milonexa-storage-secrets"]
  verbs: ["get"]

---

# Role: Security Service - Can read secrets and audit logs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: security-service-role
  namespace: milonexa
rules:
# Service discovery
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list"]
# Read config
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Read secrets (security service needs broad access for auditing)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
# Audit pod activity
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]

---

# Role: Monitoring - Read-only access for Prometheus/Grafana
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader-role
  namespace: milonexa
rules:
# Read pod metrics
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# Read pod logs for monitoring
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get", "list"]

---

# ==================== ROLE BINDINGS ====================
# Bind roles to service accounts

# API Gateway RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: api-gateway-rolebinding
  namespace: milonexa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: api-gateway-role
subjects:
- kind: ServiceAccount
  name: api-gateway
  namespace: milonexa

---

