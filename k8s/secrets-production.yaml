apiVersion: v1
kind: Secret
metadata:
  name: milonexa-docker-registry
  namespace: milonexa
  labels:
    app: milonexa
    component: registry
type: kubernetes.io/dockercfg
data:
  # ==================== DOCKER REGISTRY CREDENTIALS ====================
  # For pulling private container images from GitHub Container Registry
  .dockercfg: "CHANGEME-REPLACE-WITH-BASE64-ENCODED-DOCKER-CONFIG"

---

# ==================== SECRET ROTATION SCHEDULE ====================
# 
# Critical Secrets (Monthly Rotation):
# - JWT_SECRET
# - ADMIN_PASSWORD
# - Database passwords
#
# High-Priority Secrets (Quarterly Rotation):
# - API keys (OpenAI, Sentry, etc.)
# - OAuth secrets
#
# Medium-Priority Secrets (Annual Rotation):
# - TLS certificates (usually auto-renewed by cert-manager)
#
# Rotation Process:
# 1. Generate new secret value securely
# 2. Update in secret manager (Vault, AWS Secrets Manager)
# 3. Create new K8s secret with new value
# 4. Trigger pod restart: kubectl rollout restart deployment/<service>
# 5. Monitor for any issues
# 6. Mark old secret as deprecated (30-day grace period)
# 7. Remove old secret after grace period

