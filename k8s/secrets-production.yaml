  GITHUB_CLIENT_ID: "CHANGEME-REPLACE-WITH-GITHUB-CLIENT-ID"
  GITHUB_CLIENT_SECRET: "CHANGEME-REPLACE-WITH-GITHUB-CLIENT-SECRET"
  GITHUB_REDIRECT_URI: "https://api.milonexa.com/auth/github/callback"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-ssl-tls
  namespace: milonexa
  labels:
    app: milonexa
    component: ssl-tls
type: kubernetes.io/tls
data:
  # ==================== TLS CERTIFICATES ====================
  # Production: Use Let's Encrypt (cert-manager) or purchased certificates
  # DO NOT include raw certificate data in Git!
  # Load from secure secret manager
  
  tls.crt: "CHANGEME-REPLACE-WITH-BASE64-ENCODED-CERT"
  tls.key: "CHANGEME-REPLACE-WITH-BASE64-ENCODED-KEY"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-cloudflare-secrets
  namespace: milonexa
  labels:
