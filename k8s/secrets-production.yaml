# Production Kubernetes Secrets Configuration
# 
# ⚠️  CRITICAL SECURITY NOTICE:
# ====================================================================
# This template contains placeholders for all production secrets.
# 
# NEVER commit actual secrets to Git!
# NEVER use placeholder values in production!
# 
# Secret Management Best Practices:
# 1. Use HashiCorp Vault, AWS Secrets Manager, or Azure Key Vault
# 2. Rotate secrets quarterly (or per compliance requirements)
# 3. Use RBAC to limit who can view secrets
# 4. Encrypt secrets at rest in etcd (enable EncryptionConfiguration)
# 5. Enable audit logging for all secret access
# 6. Use sealed-secrets or external-secrets for GitOps workflows
# ====================================================================
#
# Setup Instructions:
# 1. Generate strong values for each CHANGEME placeholder
# 2. Load into secure secret management system
# 3. Create final secrets.yaml with real values
# 4. Apply ONLY to secure cluster: kubectl apply -f secrets.yaml
# 5. Verify: kubectl get secrets -n milonexa
# 6. Clean up: rm secrets.yaml (don't commit to Git)

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-core-secrets
  namespace: milonexa
  labels:
    app: milonexa
    component: core-secrets
type: Opaque
stringData:
  
  # ==================== AUTHENTICATION ====================
  # Generate strong keys: openssl rand -base64 32
  JWT_SECRET: "CHANGEME-REPLACE-WITH-YOUR-JWT-SECRET"
  JWT_PRIVATE_KEY: "CHANGEME-REPLACE-WITH-RSA-PRIVATE-KEY"
  JWT_PUBLIC_KEY: "CHANGEME-REPLACE-WITH-RSA-PUBLIC-KEY"
  REFRESH_TOKEN_SECRET: "CHANGEME-REPLACE-WITH-REFRESH-TOKEN-SECRET"
  
  # ==================== ENCRYPTION ====================
  # Used for encrypting sensitive data at rest
  # Generate: openssl rand -base64 32
  DATA_ENCRYPTION_KEY: "CHANGEME-REPLACE-WITH-AES-256-KEY"
  
  # ==================== ADMIN CREDENTIALS ====================
  # For admin panel: used only in staging/production with strict RBAC
  ADMIN_USERNAME: "CHANGEME-REPLACE-WITH-ADMIN-USERNAME"
  ADMIN_PASSWORD: "CHANGEME-REPLACE-WITH-SECURE-ADMIN-PASSWORD"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-database-secrets
  namespace: milonexa
  labels:
    app: milonexa
    tier: database
type: Opaque
stringData:
  
  # ==================== PRIMARY DATABASE ====================
  # Production: Use managed service (AWS RDS, Google Cloud SQL, Azure Database)
  # DO NOT use internal PostgreSQL in production for data persistence
  
  # User Service Database
  USER_DB_HOST: "CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com"
  USER_DB_PORT: "5432"
  USER_DB_NAME: "milonexa_users"
  USER_DB_USER: "CHANGEME-users_db_user"
  USER_DB_PASSWORD: "CHANGEME-REPLACE-WITH-SECURE-PASSWORD"
  USER_DATABASE_URL: "postgresql://CHANGEME-users_db_user:CHANGEME-PASSWORD@CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com:5432/milonexa_users"
  
  # Content Service Database
  CONTENT_DB_HOST: "CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com"
  CONTENT_DB_PORT: "5432"
  CONTENT_DB_NAME: "milonexa_content"
  CONTENT_DB_USER: "CHANGEME-content_db_user"
  CONTENT_DB_PASSWORD: "CHANGEME-REPLACE-WITH-SECURE-PASSWORD"
  CONTENT_DATABASE_URL: "postgresql://CHANGEME-content_db_user:CHANGEME-PASSWORD@CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com:5432/milonexa_content"
  
  # Messaging Service Database
  MESSAGES_DB_HOST: "CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com"
  MESSAGES_DB_PORT: "5432"
  MESSAGES_DB_NAME: "milonexa_messages"
  MESSAGES_DB_USER: "CHANGEME-messages_db_user"
  MESSAGES_DB_PASSWORD: "CHANGEME-REPLACE-WITH-SECURE-PASSWORD"
  MESSAGES_DATABASE_URL: "postgresql://CHANGEME-messages_db_user:CHANGEME-PASSWORD@CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com:5432/milonexa_messages"
  
  # Shop Service Database
  SHOP_DB_HOST: "CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com"
  SHOP_DB_PORT: "5432"
  SHOP_DB_NAME: "milonexa_shop"
  SHOP_DB_USER: "CHANGEME-shop_db_user"
  SHOP_DB_PASSWORD: "CHANGEME-REPLACE-WITH-SECURE-PASSWORD"
  SHOP_DATABASE_URL: "postgresql://CHANGEME-shop_db_user:CHANGEME-PASSWORD@CHANGEME-postgres.xxxxx.us-east-1.rds.amazonaws.com:5432/milonexa_shop"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-cache-secrets
  namespace: milonexa
  labels:
    app: milonexa
    tier: cache
type: Opaque
stringData:
  
  # ==================== REDIS CACHE ====================
  # Production: Use managed Redis (AWS ElastiCache, Azure Cache for Redis)
  REDIS_HOST: "CHANGEME-redis.xxxxx.ng.0001.use1.cache.amazonaws.com"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_PASSWORD: "CHANGEME-REPLACE-WITH-STRONG-REDIS-PASSWORD"
  REDIS_URL: "redis://:CHANGEME-PASSWORD@CHANGEME-redis.xxxxx.cache.amazonaws.com:6379/0"
  REDIS_SENTINEL_NODES: "CHANGEME-sentinel-1:26379,CHANGEME-sentinel-2:26379"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-storage-secrets
  namespace: milonexa
  labels:
    app: milonexa
    tier: storage
type: Opaque
stringData:
  
  # ==================== AWS S3 (File Storage) ====================
  # Create IAM user with S3-only permissions
  # Bucket: Private, with encryption, versioning, and MFA delete enabled
  
  S3_ACCESS_KEY_ID: "CHANGEME-REPLACE-WITH-AWS-S3-ACCESS-KEY"
  S3_SECRET_ACCESS_KEY: "CHANGEME-REPLACE-WITH-AWS-S3-SECRET-KEY"
  S3_REGION: "us-east-1"
  S3_BUCKET: "CHANGEME-milonexa-prod"
  S3_ENDPOINT: "https://s3.us-east-1.amazonaws.com"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-email-secrets
  namespace: milonexa
  labels:
    app: milonexa
    component: email
type: Opaque
stringData:
  
  # ==================== SMTP (Email Service) ====================
  # Production: Use dedicated email service (SendGrid, AWS SES, etc.)
  
  SMTP_HOST: "CHANGEME-smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USER: "CHANGEME-apikey"
  SMTP_PASSWORD: "CHANGEME-REPLACE-WITH-SENDGRID-API-KEY"
  SMTP_TLS: "true"
  SMTP_FROM_EMAIL: "noreply@milonexa.com"
  SMTP_FROM_NAME: "Milonexa"

---

apiVersion: v1
kind: Secret
metadata:
  name: milonexa-ai-secrets
  namespace: milonexa
  labels:
    app: milonexa
    component: ai-service
type: Opaque
stringData:
  
  # ==================== AI/LLM API KEYS ====================
  # OpenAI API key with rate limiting enabled
  OPENAI_API_KEY: "CHANGEME-sk-REPLACE-WITH-OPENAI-API-KEY"
  OPENAI_ORGANIZATION_ID: "CHANGEME-REPLACE-WITH-ORG-ID"
  OPENAI_MODEL: "gpt-4"
  
  # Content moderation API
  CONTENT_MODERATION_API_KEY: "CHANGEME-REPLACE-WITH-MODERATION-KEY"

---

apiVersion: v1  
kind: Secret
metadata:
  name: milonexa-monitoring-secrets
  namespace: milonexa
  labels:
    app: milonexa
    component: monitoring
type: Opaque
stringData:
  
  # ==================== MONITORING & OBSERVABILITY ====================
  
  # Datadog Integration
  DATADOG_API_KEY: "CHANGEME-REPLACE-WITH-DATADOG-API-KEY"
  DATADOG_APP_KEY: "CHANGEME-REPLACE-WITH-DATADOG-APP-KEY"
  DATADOG_SITE: "datadoghq.com"
  
  # New Relic Integration
  NEW_RELIC_LICENSE_KEY: "CHANGEME-REPLACE-WITH-NEW-RELIC-KEY"
  NEW_RELIC_ACCOUNT_ID: "CHANGEME-REPLACE-WITH-ACCOUNT-ID"
  
  # Grafana Admin
  GRAFANA_ADMIN_USERNAME: "admin"
  GRAFANA_ADMIN_PASSWORD: "CHANGEME-REPLACE-WITH-STRONG-GRAFANA-PASSWORD"
  GRAFANA_SESSION_KEY: "CHANGEME-REPLACE-WITH-SESSION-KEY"
  
  # Error Tracking (Sentry)
  SENTRY_DSN: "CHANGEME-https://xxxxx@sentry.io/xxxxx"
  SENTRY_AUTH_TOKEN: "CHANGEME-REPLACE-WITH-SENTRY-AUTH-TOKEN"

