    component: waf
type: Opaque
stringData:
  
  # ==================== CLOUDFLARE WAF ====================
  # For DDoS protection and WAF rules
  
  CLOUDFLARE_ZONE_ID: "CHANGEME-REPLACE-WITH-ZONE-ID"
  CLOUDFLARE_API_KEY: "CHANGEME-REPLACE-WITH-API-KEY"
  CLOUDFLARE_API_TOKEN: "CHANGEME-REPLACE-WITH-API-TOKEN"

